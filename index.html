<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dune & Rhythm</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="./sounds/sounds.js"></script>
</head>
<body>
    <div class="gaviota" style="top: 15%; animation-delay: 0s;"></div>
    <div class="gaviota" style="top: 25%; animation-delay: 5s;"></div>
    <div class="gaviota" style="top: 10%; animation-delay: 10s;"></div>

    <!-- Contenedor principal -->
    <div class="app">
    <h1 class="title">Dune & Rhythm</h1>

    <!-- Drums Section -->
    <section class="instrument-container drums">
    <h2>Drums</h2>
    <img src="images/drum.png" alt="Drums" class="instrument-visual">
    <div id="drums" class="keys"></div>
    </section>

    <section class="instrument-container kalimba">
    <h2>Kalimba</h2>
    <img src="images/kalimba.svg" alt="Kalimba" class="instrument-visual">
    <div id="kalimbas" class="keys"></div>
    </section>
    </div>
</body>
</html>
